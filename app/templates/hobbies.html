<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Hobbies - Sri Nidhi Kuchana">
    <meta property="og:description" content="My Hobbies">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel='icon' href="{{ url_for('static', filename='img/favicon.ico') }}" type='image/x-icon' />
    <title>{{ title }}</title>
</head>

<body>
    {% include "_nav.html" %}

    <div class="profile profile-small">
        <h1>Hobbies & Interests</h1>
    </div>

    <main class="content">
        <section class="section">
            <div class="hobby-grid">
                {% for hobby in hobbies %}
                <div class="hobby-card">
                    <img src="{{ url_for('static', filename='img/hobbies/' + hobby.image) }}"
                         alt="{{ hobby.name }}" class="hobby-image">
                    <h3>{{ hobby.name }}</h3>
                    <p>{{ hobby.description }}</p>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
