version: "3"
services:
  myportfolio:
    container_name: myportfolio
    build: .
    restart: always
    env_file:
      - .env
    # "5000:5000" removed — nginx now handles internet traffic
    depends_on:
      - mysql

  mysql:
    container_name: mysql
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    volumes:
      - mydatabase:/var/lib/mysql

  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: nginx
    restart: always
    environment:
      - CERTBOT_EMAIL=your-email@example.com
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - ./user_conf.d:/etc/nginx/user_conf.d:ro
    depends_on:
      - myportfolio

volumes:
  mydatabase:
  nginx_secrets:
